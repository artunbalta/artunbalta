name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the lightweight scrape/render deps are needed daily; the portrait
      # libs (pillow/numpy/opencv/rembg) are never imported by these two scripts.
      - run: pip install -r scripts/requirements-ci.txt
      - run: python scripts/fetch_contributions.py
      - run: python scripts/render_heatmap_svg.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
